name: Scrape Table Sums

on:
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Install Playwright browsers (required in Actions)
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      # Step 5: Run Playwright script (your email must appear in the step name)
      - name: Run Playwright script for 23f2002684@ds.study.iitm.ac.in
        run: python table_scrape.py

      # Optional: final step
      - name: Done
        run: echo "Workflow finished"
